<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Vocales</title>

    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>Vocales</h1>

{% for letra in letras %}

    {% if letra.lower() in ['a','e','i','o','u'] %}
        <strong>{{ letra }}</strong>
    {% else %}
        {{ letra }}
    {% endif %}

{% endfor %}

</body>
</html>
